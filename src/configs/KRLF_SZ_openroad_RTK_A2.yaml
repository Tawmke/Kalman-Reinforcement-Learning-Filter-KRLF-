# KRLF configuration file，该环境用于定位修正

system:
  gpu_id: "2"

training_settings:
  training_stepnum: 25000 # 30000
  learning_rate: 0.00030950174482457767
  triptype: 'SZ_openroad_RTK_A2' # 训练类型: HK_De_ublox HK_Me_ublox HK_Ha_ublox
  running_date: 'tuning_4_testing_indomain_SZ' # 设置保存路径 finetuning_4_testing_velatt_0407 tuning_4_testing_indomain
  networkmod: 'continuous_lstmATF1'
  alltraj: True # use all traj data for training and testing
  traj_record: False # 是否保存轨迹
  traj_type_target_train: [ 0, 0.7 ]  # 轨迹数据的比例
  traj_type_target_test: [ 0.7, 1 ]

testing_settings:
  onlytesting: true # 只测试不训练
  Twoagent_testing: true # 双智能体测试
  testdate: 'tuning_4_testing_indomain_SZ'
  model_basefolder: 'SZ_openroad_RTK_A2_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_POSCorrectCov'
  model_name_list: ['lr=0.0003_mag=1_SP=0.18_PC=0.0667_Reset=1_IR=1.497609657871974']
  # 双agent模型路径
  MA_envmode: 'InHiGNSSSatCov_PreCovPos-POSCorrectCov'
  test_triptype: ['SZ_canyon_RTK']
  Dagent_file:
    SZ_canyon_RTK:
      agent_1_basefolder: 'SZ_openroad_RTK_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_PreCovPos'
      agent_2_basefolder: 'SZ_openroad_RTK_A2_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_POSCorrectCov'
      agent_1_folder: 'lr=0.0018_mag=1_SP=0.88_PC=0.0385_Reset=2_IR=3.435640055733063'
      agent_2_folder: 'lr=0.0004_mag=1_SP=0.99_PC=0.0193_Reset=1_IR=1.497609657871974'
      Dual_agent_basefolder: 'SZ_openroad_RTK_InHiGNSSSatCov_PreCovPosCorrect_D-agent'
    SZ_overpass_RTK:
      agent_1_basefolder: 'SZ_openroad_RTK_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_PreCovPos'
      agent_2_basefolder: 'SZ_openroad_RTK_A2_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_POSCorrectCov'
      agent_1_folder: 'lr=0.0001_mag=1_SP=0.47_PC=0.0212_Reset=1_IR=9.994329590116656'
      agent_2_folder: 'lr=0.0003_mag=1_SP=0.18_PC=0.0667_Reset=1_IR=1.497609657871974'
      Dual_agent_basefolder: 'SZ_openroad_RTK_InHiGNSSSatCov_PreCovPosCorrect_D-agent'
    SZ_openroad_RTK:
      agent_1_basefolder: 'SZ_openroad_RTK_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_PreCovPos'
      agent_2_basefolder: 'SZ_openroad_RTK_A2_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_POSCorrectCov'
      agent_1_folder: 'lr=0.0003_mag=1_SP=1.44_PC=0.0600_Reset=2_IR=8.807494542893036'
      agent_2_folder: 'lr=0.0002_mag=1_SP=0.27_PC=0.0135_Reset=1_IR=1.497609657871974'
      Dual_agent_basefolder: 'SZ_openroad_RTK_InHiGNSSSatCov_PreCovPosCorrect_D-agent'
    SZ_forest_RTK:
      agent_1_basefolder: 'SZ_openroad_RTK_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_PreCovPos'
      agent_2_basefolder: 'SZ_openroad_RTK_A2_0.7_1_RMSEadv_ratio_InHiGNSSSatCov_POSCorrectCov'
      agent_1_folder: 'lr=0.0001_mag=1_SP=0.48_PC=0.0274_Reset=1_IR=9.88161706574485'
      agent_2_folder: 'lr=0.0004_mag=1_SP=0.99_PC=0.0193_Reset=1_IR=1.497609657871974'
      Dual_agent_basefolder: 'SZ_openroad_RTK_InHiGNSSSatCov_PreCovPosCorrect_D-agent'

  # 微调参数
  kf_coef: 0.5

env_para:
#  envmode:
#  1. InHiGNSSSatCov_PreCovPos: 输入：新息 历史差分 GNSS 状态 RLf，输出：位置增量，协方差
#  2. InHiGNSSSatCov_POSCorrectCov: 输入：新息 历史差分 GNSS 状态 RLf，输出：位置修正，P协方差调整
  envmod: 'InHiGNSSSatCov_POSCorrectCov'
  conv_mode: 'Tuning' # Tuning Pred
  trajdata_sort: 'sorted' # 是否乱序
  postraj_num: 20 # 窗口步数
  baseline_mod : 'GNSS/INS' # baseline方法 GNSS/INS GNSS
  cord: 'NED' # LLH NED 动作操作的位置增量
  RL_reset_step: 1
  prdcov_mode: 'Scale_mode1' # Add_mode1 Add_mode2 Scale_mode1
   # 连续动作设置（根据环境不一样，参数会不同）
  continuous_actionspace: [-100,100]
  continuous_scale_state_pred: 0.1 # 位置预测的动作尺度
  continuous_scale_policy_cov: 0.01 # RL协方差估计的动作尺度
  # 初始化设置
  initial_RLcov: 1.497609657871974
  magnitude: 1
  # 奖励设置： RMSEadv_tanh RMSEratio_log RMSEratio_tanh RMSEadv RMSEadv_log RMSEadv_ratio
  reward_setting: 'RMSEadv_ratio'
  pos_weight: 1
  # discrete action settings （基本不用）
  discrete_actionspace: 7
  action_scale: 3e-1 # scale in meters

model_para:
  networkmod: 'continuous_lstmATF1'
  net_archppo: [64, 64]
  ent_coef: 0 # 0.059612708084198295 # 策略熵损失，增加探索（训练可以求稳）
  vf_coef: 0.5167440119854488 # critic学不出来，可以调大
  n_steps: 128 # reply buffer的大小, 增大可以提高稳定性，减小方差
  batch_size: 128 # 每次训练取样本
  clip_range: 0.23096757712699
  clip_range_vf: None
  n_epochs: 20 # 训练epoch

testing_dataset_setting:
  'SZ_canyon_RTK': ['SZ_canyon_RTK','SZ_overpass_RTK','SZ_openroad_RTK','SZ_forest_RTK']
  'SZ_openroad_RTK_A2': ['SZ_canyon_RTK','SZ_overpass_RTK','SZ_openroad_RTK_A2','SZ_forest_RTK']
  'SZ_overpass_RTK': ['SZ_canyon_RTK','SZ_overpass_RTK','SZ_openroad_RTK','SZ_forest_RTK']
  'SZ_openroad_RTK': ['SZ_canyon_RTK','SZ_overpass_RTK','SZ_openroad_RTK','SZ_forest_RTK']
  'SZ_forest_RTK': ['SZ_canyon_RTK','SZ_overpass_RTK','SZ_openroad_RTK','SZ_forest_RTK']

